<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GemPulse | Профіль</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>GemPulse</h1>
      <nav>
        <a href="profile.html" class="active">Профіль</a>
        <a href="transfer.html">Передача гемів</a>
        <a href="shop.html">Магазин</a>
      </nav>
      <button id="logout" class="btn">Вийти</button>
    </header>

    <main class="container profile-page">
      <h2 class="page-title">Профіль користувача</h2>

      <section class="profile-hero card">
        <div id="profile-initials" class="avatar">KD</div>
        <div>
          <h3 id="profile-name">Катерина Д.</h3>
          <p id="profile-email" class="muted-text">kateryna.d@company.com</p>
        </div>
      </section>

      <section id="gem-stats-grid" class="stats-grid"></section>

      <section class="card history-card">
        <h3>Історія транзакцій</h3>

        <div class="history-filters">
          <button id="history-filter-received" class="filter-btn active" type="button">Отримав від інших</button>
          <button id="history-filter-sent" class="filter-btn" type="button">Віддав іншим</button>
        </div>

        <div class="table-wrap">
          <table class="history-table">
            <thead>
              <tr>
                <th>Дата</th>
                <th>Від кого</th>
                <th>Кому</th>
                <th>Тип гему</th>
                <th>Кількість</th>
                <th>Коментар</th>
              </tr>
            </thead>
            <tbody id="history-table-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
