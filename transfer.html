<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GemPulse | Передача гемів</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>GemPulse</h1>
      <nav>
        <a href="profile.html">Профіль</a>
        <a href="transfer.html" class="active">Передача гемів</a>
        <a href="shop.html">Магазин</a>
      </nav>
      <button id="logout" class="btn">Вийти</button>
    </header>

    <main class="container">
      <section class="card">
        <h2>Передати гем колезі</h2>
        <form id="transfer-form" class="form-grid">
          <div>
            <label for="colleague">Кому</label>
            <select id="colleague" required>
              <option value="">Оберіть колегу</option>
            </select>
          </div>

          <div>
            <label for="gem-type">Тип гему</label>
            <select id="gem-type" required>
              <option value="">Оберіть тип</option>
            </select>
          </div>

          <div class="full-width">
            <label for="comment">Коментар (за що дякуєте)</label>
            <textarea id="comment" rows="4" placeholder="Наприклад: Дякую за допомогу з релізом" required></textarea>
          </div>

          <button type="submit" class="btn btn-primary">Надіслати гем</button>
        </form>
        <p id="transfer-message" class="message"></p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
